on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deployment_url:
        required: true
        type: string
      cf_project_name:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.deployment_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build --mode=${{ inputs.environment }}
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_TICKET_COST: ${{ vars.TICKET_COST }}
          VITE_ACCOUNT_NO: ${{ vars.ACCOUNT_NO }}
          VITE_ACCOUNT_BANK: ${{ vars.ACCOUNT_BANK }}
          VITE_ACCOUNT_BANK_CODE: ${{ vars.ACCOUNT_BANK_CODE }}
          VITE_ACCOUNT_OWNER: ${{ vars.ACCOUNT_OWNER }}
          VITE_PERSONALITIES: ${{ vars.PERSONALITIES }}
          VITE_TERMS: ${{ vars.TERMS }}
          VITE_PRIVACY: ${{ vars.PRIVACY }}
          VITE_REFUND_POLICY: ${{ vars.REFUND_POLICY }}
          VITE_ENABLE_SAVED: ${{ vars.ENABLE_SAVED }}
          VITE_ENABLE_PROFILE_VIEW: ${{ vars.ENABLE_PROFILE_VIEW }}
          VITE_ENABLE_REGISTER: ${{ vars.ENABLE_REGISTER }}
          VITE_ENABLE_KAKAO_PAYMENTS: ${{ vars.ENABLE_KAKAO_PAYMENTS }}
          VITE_ENABLE_CONNECTION_INFO: ${{ vars.ENABLE_CONNECTION_INFO }}
          VITE_DISABLED_PROFILE_VIEW_DESC: ${{ vars.DISABLED_PROFILE_VIEW_DESC }}
          VITE_DISABLED_REGISTER_DESC: ${{ vars.DISABLED_REGISTER_DESC }}
          VITE_SHA: ${{ github.sha }}
          VITE_GA_ID: ${{ vars.GA_ID }}
          VITE_MIXPANEL_TOKEN: ${{ vars.MIXPANEL_TOKEN }}
          VITE_NOTICE: ${{ vars.NOTICE }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          VITE_PROFILE_ANALYSIS_WRITINGS: ${{ vars.PROFILE_ANALYSIS_WRITINGS }}
          VITE_DATA_EXPIRY: ${{ vars.DATA_EXPIRY }}

      - name: Create Cloudflare Pages project (if not exists)
        run: npx wrangler pages project create ${{ inputs.cf_project_name }} --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ inputs.cf_project_name }}
          directory: dist
          branch: main
